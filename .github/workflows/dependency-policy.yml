name: Dependency policy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check dependency admission policy
        run: bash scripts/check-dependency-policy.sh

      - name: Install cargo-deny
        if: hashFiles('Cargo.lock') != ''
        run: cargo install cargo-deny --version 0.18.5 --locked

      - name: Check advisories, licenses, sources, and duplicate versions
        if: hashFiles('Cargo.lock') != ''
        run: |
          cargo deny check advisories licenses bans sources
          cargo tree --locked --duplicates
