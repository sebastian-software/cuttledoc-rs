name: Node-API packed artifact

on:
  pull_request:
    paths:
      - ".github/workflows/node-api-spike.yml"
      - "fixtures/contracts/transcription-updates.tsv"
      - "scripts/run-node-api-spike.sh"
      - "spikes/node-api/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/node-api-spike.yml"
      - "fixtures/contracts/transcription-updates.tsv"
      - "scripts/run-node-api-spike.sh"
      - "spikes/node-api/**"

permissions:
  contents: read

jobs:
  packed-artifact:
    name: Node ${{ matrix.node }} / macOS arm64
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Select the minimum supported Rust toolchain
        run: rustup override set 1.88.0
      - name: Build, pack, install, and test the final tarball
        run: bash scripts/run-node-api-spike.sh
