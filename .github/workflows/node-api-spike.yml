name: Node-API packed artifact

on:
  pull_request:
    paths:
      - ".github/workflows/node-api-spike.yml"
      - "fixtures/contracts/transcription-updates.tsv"
      - "scripts/run-node-api-spike.sh"
      - "spikes/node-api/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/node-api-spike.yml"
      - "fixtures/contracts/transcription-updates.tsv"
      - "scripts/run-node-api-spike.sh"
      - "spikes/node-api/**"

permissions:
  contents: read

jobs:
  packed-artifact:
    name: Node ${{ matrix.node }} / macOS arm64
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Select the minimum supported Rust toolchain
        run: rustup override set 1.88.0
      - name: Build, pack, install, and test the final tarball
        run: bash scripts/run-node-api-spike.sh
