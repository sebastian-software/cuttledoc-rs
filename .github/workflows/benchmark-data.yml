name: Benchmark data

on:
  pull_request:
    paths:
      - "benchmarks/**"
      - "scripts/fetch-audiobook-pilot.mjs"
      - "scripts/import-target-domain-source.mjs"
      - "scripts/materialize-target-domain-corpus.mjs"
      - "scripts/import-asr-aggregate.mjs"
      - "scripts/analyze-asr-errors.mjs"
      - "scripts/archive-qwen-tts-calibration.mjs"
      - "scripts/encode-benchmark-opus.mjs"
      - "scripts/capture-huggingface-model-metadata.mjs"
      - "scripts/fetch-tts-calibration-model.sh"
      - "scripts/run-qwen3-tts-voicedesign-calibration.sh"
      - "scripts/run-tts-calibration-asr.mjs"
      - "scripts/validate-benchmark-data.mjs"
      - "scripts/validate-opus-codec-control.mjs"
      - "scripts/validate-tts-calibration-manifests.mjs"
      - "scripts/validate-text-generation-mlx-reference.mjs"
      - "scripts/validate-text-generation-model-manifests.mjs"
      - "scripts/validate-text-generation-experiments.mjs"
      - "scripts/validate-text-generation-openrouter-reference.mjs"
      - "scripts/generate-postprocessing-factorial-matrix.mjs"
      - "scripts/validate-postprocessing-factorial-plan.mjs"
      - "spikes/text-generation-mlx-reference/**"
      - "spikes/text-generation-openrouter-reference/**"
      - "spikes/tts-calibration/**"
      - ".gitattributes"
      - ".github/workflows/benchmark-data.yml"
  push:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "scripts/fetch-audiobook-pilot.mjs"
      - "scripts/import-target-domain-source.mjs"
      - "scripts/materialize-target-domain-corpus.mjs"
      - "scripts/import-asr-aggregate.mjs"
      - "scripts/analyze-asr-errors.mjs"
      - "scripts/archive-qwen-tts-calibration.mjs"
      - "scripts/encode-benchmark-opus.mjs"
      - "scripts/capture-huggingface-model-metadata.mjs"
      - "scripts/fetch-tts-calibration-model.sh"
      - "scripts/run-qwen3-tts-voicedesign-calibration.sh"
      - "scripts/run-tts-calibration-asr.mjs"
      - "scripts/validate-benchmark-data.mjs"
      - "scripts/validate-opus-codec-control.mjs"
      - "scripts/validate-tts-calibration-manifests.mjs"
      - "scripts/validate-text-generation-mlx-reference.mjs"
      - "scripts/validate-text-generation-model-manifests.mjs"
      - "scripts/validate-text-generation-experiments.mjs"
      - "scripts/validate-text-generation-openrouter-reference.mjs"
      - "scripts/generate-postprocessing-factorial-matrix.mjs"
      - "scripts/validate-postprocessing-factorial-plan.mjs"
      - "spikes/text-generation-mlx-reference/**"
      - "spikes/text-generation-openrouter-reference/**"
      - "spikes/tts-calibration/**"
      - ".gitattributes"
      - ".github/workflows/benchmark-data.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate schemas, fixtures, and run records
        run: node scripts/validate-benchmark-data.mjs --self-test
      - name: Validate pinned TTS calibration models
        run: node scripts/validate-tts-calibration-manifests.mjs --self-test
      - name: Validate pinned MLX text-generation reference
        run: |
          node scripts/validate-text-generation-mlx-reference.mjs --self-test
          node scripts/validate-text-generation-model-manifests.mjs --self-test
          node scripts/validate-text-generation-experiments.mjs --self-test
          python -m py_compile spikes/text-generation-mlx-reference/run_reference.py
          bash -n scripts/fetch-text-generation-mlx-model.sh
          bash -n scripts/run-text-generation-mlx-reference.sh
      - name: Validate pinned OpenRouter text-generation reference
        run: |
          node scripts/validate-text-generation-openrouter-reference.mjs --self-test
          node --check spikes/text-generation-openrouter-reference/run_reference.mjs
      - name: Validate factorial postprocessing matrix
        run: |
          node scripts/generate-postprocessing-factorial-matrix.mjs --check
          node scripts/validate-postprocessing-factorial-plan.mjs --self-test
      - name: Check TTS calibration runners
        run: |
          node --check scripts/archive-qwen-tts-calibration.mjs
          node --check scripts/run-tts-calibration-asr.mjs
          python -m py_compile spikes/tts-calibration/run_qwen_voicedesign.py
          bash -n scripts/run-qwen3-tts-voicedesign-calibration.sh
      - name: Validate committed Opus fixture and codec control
        run: node scripts/validate-opus-codec-control.mjs --self-test
      - name: Verify rights-gated local source import
        run: node scripts/import-target-domain-source.mjs --self-test
      - name: Verify target-domain corpus materializer
        run: node scripts/materialize-target-domain-corpus.mjs --self-test
      - name: Verify deterministic ASR error analysis
        run: >-
          node scripts/analyze-asr-errors.mjs
          --check benchmarks/analysis/phase0.multilingual-fleurs-10-1.errors.json
      - name: Verify deterministic audiobook ASR error analysis
        run: >-
          node scripts/analyze-asr-errors.mjs
          --input benchmarks/raw/phase0.whisper.audiobook-pilot-1/result.json
          --input benchmarks/raw/phase0.apple-speech.audiobook-pilot-1/result.json
          --input benchmarks/raw/phase0.parakeet.audiobook-pilot-1/result.json
          --input benchmarks/raw/phase0.qwen3-asr-0.6b-mlx-reference.audiobook-pilot-1/result.json
          --fixture-manifest benchmarks/fixtures/audiobook-pilot.json
          --analysis-id phase0-audiobook-pilot-error-analysis-1
          --caveat "Three already-inspected development clips per language; dataset transcripts are unverified and error classes are not population estimates."
          --check benchmarks/analysis/phase0.audiobook-pilot-1.errors.json
